; DefaultEditor.ini — Koydo Worlds
; Editor preferences tuned for monorepo workflow and rapid iteration
; with the BridgeLoom plugin.

[/Script/UnrealEd.EditorLoadingSavingSettings]
bMonitorContentDirectories=True
AutoSaveTimeMinutes=10.0
bAutoSaveEnable=True

[/Script/UnrealEd.EditorPerformanceSettings]
bMonitorEditorPerformance=True
bThrottleCPUWhenNotForeground=True

[/Script/Engine.UserInterfaceSettings]
RenderFocusRule=NonPointer

[/Script/SourceCodeAccess.SourceCodeAccessSettings]
PreferredAccessor=VisualStudio2022

[/Script/UnrealEd.LevelEditorPlayNetworkEmulationSettings]

[/Script/UnrealEd.ProjectPackagingSettings]
Build=IfProjectHasCode
BuildTarget=KoydoWorlds
Configuration=Shipping
bGenerateChunks=False
bBuildDDCInBackground=True
FullRebuildAssetList=()
DirectoriesToAlwaysCook=()
DirectoriesToNeverCook=()
PackagingMode=AsStagedBuilds

[/Script/HardwareTargeting.HardwareTargetingSettings]
TargetedHardwareClass=Desktop
AppliedTargetedHardwareClass=Desktop
DefaultGraphicsPerformance=Maximum
AppliedDefaultGraphicsPerformance=Maximum

[/Script/UnrealEd.EditorExperimentalSettings]
bWorldPartitionNavigationDataBuilder=True
bEnablePCGEditor=True

; Loom-specific editor helpers
[/Script/BridgeLoom.BridgeLoomEditorSettings]
bAutoConnectOnPIE=True
PIEServerAddress=localhost
PIEServerPort=50051
bShowLoomDebugOverlay=True
