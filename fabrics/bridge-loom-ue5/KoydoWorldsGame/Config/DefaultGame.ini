; DefaultGame.ini — Koydo Worlds
; Sets the Loom-authoritative game mode and controller as defaults.
; All world-state is server-authoritative via gRPC; UE5 is the renderer.

[/Script/EngineSettings.GeneralProjectSettings]
ProjectName=KoydoWorlds
ProjectDisplayedTitle=NSLOCTEXT("", "KoydoWorldsTitle", "Koydo Worlds")
ProjectDebugTitleInfo=NSLOCTEXT("", "KoydoWorldsDebugInfo", "Project Loom — Bridge v0.1")
CompanyName=Koydo
CompanyDistinguishedName=CN=Koydo
CopyrightNotice=Copyright Project Loom. All Rights Reserved.
ProjectVersion=0.1.0
bUseBorderlessWindow=False
bStartInVR=False
bAllowMobileAnalytics=False
bShouldWindowPreserveAspectRatio=True

[/Script/Engine.GameModeBase]
PlayerControllerClass=/Script/BridgeLoom.LoomPlayerController
DefaultPawnClass=/Script/BridgeLoom.LoomCharacter
HUDClass=/Script/Engine.HUD
SpectatorClass=/Script/Engine.SpectatorPawn

[/Script/Engine.GameMaps]
ServerDefaultMap=/Game/Maps/LoomEntry.LoomEntry
GameDefaultMap=/Game/Maps/LoomEntry.LoomEntry
TransitionMap=/Game/Maps/LoomTransition.LoomTransition
GlobalDefaultGameMode=/Script/BridgeLoom.LoomGameMode
GlobalDefaultServerGameMode=/Script/BridgeLoom.LoomGameMode

[/Script/Engine.GameSession]
MaxPlayers=100
MaxSpectators=10

[/Script/BridgeLoom.LoomGameMode]
DefaultServerAddress=localhost
DefaultServerPort=50051
