; KoydoLoom — DefaultInput.ini
; All player input is routed through UBridgeLoomInputComponent (EnhancedInput).
; Input Mapping Contexts (IMC) are Content assets loaded at runtime by the
; BridgeLoom plugin — no legacy AxisMappings or ActionMappings defined here.

[/Script/Engine.InputSettings]
bUseEnhancedInput=True
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent

; Prevent legacy bindings from shadowing IMC actions
bEnableGestureRecognizer=False
bFilterInputByPlatformUser=True
bShouldFlushPressedKeysOnViewportFocusLost=True

; Mouse sensitivity — overridden per-player via Settings UI
DefaultViewportMouseSensitivity=(X=1.0,Y=1.0)
DoubleClickTime=0.2
