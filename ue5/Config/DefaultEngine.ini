; KoydoLoom — DefaultEngine.ini
; UE5.5 | Server-authoritative via Loom gRPC bridge

[/Script/EngineSettings.GameMapsSettings]
GlobalDefaultGameMode=/Script/BridgeLoom.LoomGameMode
GlobalDefaultServerGameMode=/Script/BridgeLoom.LoomGameMode
GameDefaultMap=/Game/Maps/LoomWorld
EditorStartupMap=/Game/Maps/LoomWorld
GlobalDefaultPawnClass=/Script/BridgeLoom.LoomCharacter
GlobalDefaultPlayerControllerClass=/Script/BridgeLoom.LoomPlayerController

[/Script/Engine.Engine]
bUseFixedFrameRate=False
FixedFrameRate=60.0
NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")

; ── Rendering ─────────────────────────────────────────────────────────────────

[/Script/Engine.RendererSettings]
; Lumen global illumination — Koydo requires dynamic GI (no baked lighting)
r.Lumen.Reflections.Allow=1
r.Lumen.GlobalIllumination.Allow=1

; Virtual Shadow Maps — needed for dense NPC crowds and foliage
r.Shadow.Virtual.Enable=1

; Nanite — all environment meshes are Nanite; disable legacy proxy fallback
r.NaniteProxyRenderMode=0

; TSR upscaler (UE5.5 default — better than DLSS on all platforms)
r.AntiAliasingMethod=4
r.TemporalAA.Upsampling=1

; Disable auto exposure in outdoor worlds (controlled by post-process volumes)
r.DefaultFeature.AutoExposure=False
r.DefaultFeature.MotionBlur=True
r.DefaultFeature.AmbientOcclusion=False

; ── Streaming ─────────────────────────────────────────────────────────────────

[/Script/Engine.StreamingSettings]
; Higher pool size for Koydo's dense MetaHuman NPC crowds
s.AsyncLoadingThreadEnabled=True
s.EventDrivenLoaderEnabled=True

[/Script/Engine.LevelStreamingKismet]
bInitiallyLoaded=False
bInitiallyVisible=False

; ── World Partition ───────────────────────────────────────────────────────────

[/Script/Engine.WorldSettings]
bEnableWorldBoundsChecks=False

; ── Mass Entity (crowd simulation) ────────────────────────────────────────────

[/Script/MassEntity.MassEntitySettings]
MaxEntityCountForDebugging=10000

; ── Pixel Streaming defaults ──────────────────────────────────────────────────

[/Script/PixelStreaming.PixelStreamingSettings]
; Enabled at launch via -PixelStreamingURL=ws://signalling:8888 command-line arg.
; These are compile-time fallback values only — real config comes from Loom.
WebRTCFps=60
LossyPartialFrames=False
SendPlayerIdAsInteger=False

; ── Network ───────────────────────────────────────────────────────────────────

[/Script/OnlineSubsystemUtils.IpNetDriver]
NetServerMaxTickRate=60
MaxNetTickRate=60
MaxInternetClientRate=100000
MaxClientRate=100000

; ── Chaos Physics ─────────────────────────────────────────────────────────────

[/Script/Engine.PhysicsSettings]
bSuppressFaceRemapTable=False
bDefaultHasComplexCollision=True
MaxPhysicsDeltaTime=0.033333
SimulateScratchMemorySize=262144
RagdollAggregateThreshold=4

; ── Audio ─────────────────────────────────────────────────────────────────────

[/Script/Engine.AudioSettings]
DefaultSoundClassName=/Script/Engine.SoundClass'/Game/Audio/SC_Master.SC_Master'
