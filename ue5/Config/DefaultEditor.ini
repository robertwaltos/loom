; KoydoLoom — DefaultEditor.ini

[/Script/UnrealEd.EditorEngine]
; Keep the auto-save interval long — developers save explicitly
AutoSaveTimeMinutes=10
bAutoSaveEnable=True

[/Script/UnrealEd.LevelEditorViewportSettings]
bLevelStreamingVolumePrevis=False

[/Script/UnrealEd.ProjectPackagingSettings]
BuildConfiguration=Development
FullRebuild=False
bUsePakFile=True
bCompressed=True
Build=IfProjectHasCode
BlueprintNativizationMethod=Disabled

; Platforms targeted for Koydo shipping builds
+SupportedPlatforms=Windows
+SupportedPlatforms=Linux
+SupportedPlatforms=Android

; Directories to always cook (referenced by Loom plugin on startup)
+DirectoriesToAlwaysCook=(Path="/Game/Maps")
+DirectoriesToAlwaysCook=(Path="/Game/Audio")
+DirectoriesToAlwaysCook=(Path="/BridgeLoom")
