# =============================================================================
# Koydo Monitoring Stack — Prometheus + Grafana
# Namespace: koydo-monitoring
# Apply: kubectl apply -f k8s/monitoring.yml -f k8s/alerts.yml
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: koydo-monitoring
  labels:
    app.kubernetes.io/part-of: koydo
    app.kubernetes.io/managed-by: kubectl

---
# =============================================================================
# PROMETHEUS
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics-collection
    app.kubernetes.io/part-of: koydo-monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: koydo-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: koydo-monitoring
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: koydo-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: koydo-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: koydo-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: koydo-monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: koydo-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      scrape_timeout:      10s
      external_labels:
        cluster: koydo-prod
        region:  us-east-1

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Loom core game server
      - job_name: loom-core
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets: ['loom-core.loom.svc.cluster.local:8080']
            labels:
              service: loom-core
              namespace: loom
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      # Nakama game backend (admin port exposes /metrics)
      - job_name: nakama
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets: ['nakama.loom.svc.cluster.local:7351']
            labels:
              service: nakama
              namespace: loom
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      # Kubelet cAdvisor — container resource metrics
      - job_name: kubelet
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      # kube-state-metrics — PVC usage, pod status, restart counts
      - job_name: kube-state-metrics
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: koydo-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics-collection
    app.kubernetes.io/part-of: koydo-monitoring
    app.kubernetes.io/version: "2.51.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: metrics-collection
        app.kubernetes.io/part-of: koydo-monitoring
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      terminationGracePeriodSeconds: 300
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.retention.size=8GB
            - --web.enable-lifecycle
            - --web.enable-admin-api
            - --web.console.libraries=/etc/prometheus/console_libraries
            - --web.console.templates=/etc/prometheus/consoles
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics-collection
    app.kubernetes.io/part-of: koydo-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP

---
# =============================================================================
# GRAFANA
# =============================================================================

# WARNING: Replace REPLACE_WITH_STRONG_PASSWORD before deploying to production.
# Use: kubectl create secret generic grafana-admin-credentials \
#        --from-literal=GF_SECURITY_ADMIN_USER=admin \
#        --from-literal=GF_SECURITY_ADMIN_PASSWORD='<your-password>' \
#        -n koydo-monitoring
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: credentials
    app.kubernetes.io/part-of: koydo-monitoring
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: REPLACE_WITH_STRONG_PASSWORD

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: koydo-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus-koydo
        url: http://prometheus.koydo-monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          httpMethod: POST
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo-koydo

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: koydo-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization
    app.kubernetes.io/part-of: koydo-monitoring
    app.kubernetes.io/version: "10.4.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: visualization
        app.kubernetes.io/part-of: koydo-monitoring
    spec:
      securityContext:
        fsGroup: 472
        runAsNonRoot: true
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.koydo.gg"
            - name: GF_SERVER_DOMAIN
              value: "grafana.koydo.gg"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_SECURITY_DISABLE_GRAVATAR
              value: "true"
            - name: GF_LOG_MODE
              value: console
            - name: GF_LOG_LEVEL
              value: warn
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization
    app.kubernetes.io/part-of: koydo-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
