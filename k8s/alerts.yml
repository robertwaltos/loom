# =============================================================================
# Koydo Alert Rules
# Mounts as ConfigMap into Prometheus at /etc/prometheus/rules/
# Also includes PrometheusRule CRD for Prometheus Operator users.
#
# Apply: kubectl apply -f k8s/alerts.yml
# Reload live: kubectl exec -n koydo-monitoring deploy/prometheus -- \
#                wget -qO- --post-data='' http://localhost:9090/-/reload
# =============================================================================

# Plain ConfigMap consumed by the Prometheus deployment in monitoring.yml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: koydo-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: alert-rules
    app.kubernetes.io/part-of: koydo-monitoring
data:
  koydo-alerts.yml: |
    groups:

      # -----------------------------------------------------------------------
      # Availability — critical uptime signals
      # -----------------------------------------------------------------------
      - name: koydo.availability
        rules:
          - alert: NakamaDown
            expr: up{job="nakama"} == 0
            for: 2m
            labels:
              severity: critical
              service: nakama
              team: backend
            annotations:
              summary: "Nakama instance {{ $labels.instance }} is unreachable"
              description: >-
                Prometheus cannot scrape the Nakama target {{ $labels.instance }}
                for more than 2 minutes. Players may be unable to connect or
                authenticate.
              runbook_url: "https://docs.koydo.gg/runbooks/nakama-down"

          - alert: LoomCoreDown
            expr: up{job="loom-core"} == 0
            for: 2m
            labels:
              severity: critical
              service: loom-core
              team: backend
            annotations:
              summary: "Loom core instance {{ $labels.instance }} is unreachable"
              description: >-
                Prometheus cannot scrape loom-core {{ $labels.instance }} for
                more than 2 minutes. World-state and entity lifecycle may be
                impacted.
              runbook_url: "https://docs.koydo.gg/runbooks/loom-core-down"

      # -----------------------------------------------------------------------
      # Latency — player-facing performance
      # -----------------------------------------------------------------------
      - name: koydo.latency
        rules:
          - alert: LoomHighLatency
            expr: |
              histogram_quantile(
                0.99,
                sum(
                  rate(http_request_duration_seconds_bucket{job="loom-core"}[5m])
                ) by (le, instance)
              ) > 0.5
            for: 5m
            labels:
              severity: warning
              service: loom-core
              team: backend
            annotations:
              summary: "Loom p99 HTTP latency above 500 ms on {{ $labels.instance }}"
              description: >-
                The p99 request latency on {{ $labels.instance }} is
                {{ $value | humanizeDuration }} (threshold: 500 ms).
                Investigate slow handlers, database queries, or GC pressure.
              runbook_url: "https://docs.koydo.gg/runbooks/loom-high-latency"

      # -----------------------------------------------------------------------
      # Stability — crash loops and pod health
      # -----------------------------------------------------------------------
      - name: koydo.stability
        rules:
          - alert: PodCrashLooping
            expr: |
              increase(
                kube_pod_container_status_restarts_total{
                  namespace=~"loom|koydo-monitoring"
                }[15m]
              ) > 5
            for: 0m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
              description: >-
                Container {{ $labels.container }} in pod {{ $labels.pod }}
                (namespace {{ $labels.namespace }}) has restarted
                {{ printf "%.0f" $value }} times in the last 15 minutes.
                Check pod logs immediately: kubectl logs -n {{ $labels.namespace }}
                {{ $labels.pod }} -c {{ $labels.container }} --previous
              runbook_url: "https://docs.koydo.gg/runbooks/crash-looping"

          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{
                condition="true",
                namespace=~"loom|koydo-monitoring"
              } == 0
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 5m"
              description: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} has been in a
                non-ready state for more than 5 minutes.
              runbook_url: "https://docs.koydo.gg/runbooks/pod-not-ready"

      # -----------------------------------------------------------------------
      # Capacity — storage and connection thresholds
      # -----------------------------------------------------------------------
      - name: koydo.capacity
        rules:
          - alert: DiskPressure
            expr: |
              (
                kubelet_volume_stats_used_bytes
                /
                kubelet_volume_stats_capacity_bytes
              ) > 0.85
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: >-
                PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}
                is {{ $value | humanizePercentage }} full
              description: >-
                PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in
                namespace {{ $labels.namespace }} is at
                {{ $value | humanizePercentage }} capacity (threshold: 85%).
                Expand the PVC or purge stale data before the volume fills
                completely and causes data-loss or crash-loops.
              runbook_url: "https://docs.koydo.gg/runbooks/disk-pressure"

          - alert: DiskPressureCritical
            expr: |
              (
                kubelet_volume_stats_used_bytes
                /
                kubelet_volume_stats_capacity_bytes
              ) > 0.95
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: >-
                PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}
                is critically full ({{ $value | humanizePercentage }})
              description: >-
                PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }}
                exceeds 95% capacity. Immediate action required to prevent
                service disruption.
              runbook_url: "https://docs.koydo.gg/runbooks/disk-pressure"

          # Scale-warning: nakama_active_connections_gauge is a real Nakama metric.
          # Adjust the metric name to match your Nakama version if needed.
          - alert: HighPlayerCount
            expr: |
              sum(nakama_active_connections_gauge) > 10000
            for: 5m
            labels:
              severity: warning
              service: nakama
              team: backend
            annotations:
              summary: "Active player connections exceed scale threshold ({{ $value | printf \"%.0f\" }})"
              description: >-
                There are currently {{ printf "%.0f" $value }} active connections
                across all Nakama instances, exceeding the 10,000 soft limit.
                Consider scaling the Nakama Deployment or enabling horizontal
                pod autoscaling. Review k8s/multi-region.yml for fleet options.
              runbook_url: "https://docs.koydo.gg/runbooks/high-player-count"

---
# =============================================================================
# PrometheusRule CRD (Prometheus Operator)
# Uncomment and apply this resource if you are running the Prometheus Operator
# (kube-prometheus-stack Helm chart) instead of the standalone Prometheus
# defined in monitoring.yml.  The ConfigMap above is not needed in that case.
# =============================================================================
#
# apiVersion: monitoring.coreos.com/v1
# kind: PrometheusRule
# metadata:
#   name: koydo-alerts
#   namespace: koydo-monitoring
#   labels:
#     app.kubernetes.io/name: prometheus
#     app.kubernetes.io/component: alert-rules
#     app.kubernetes.io/part-of: koydo-monitoring
#     # Label selector used by your Prometheus CR to pick up rules:
#     release: kube-prometheus-stack
# spec:
#   groups:
#     # --- copy the groups block from the ConfigMap data above verbatim ---
