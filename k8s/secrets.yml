---
# K8s Secrets for Loom server.
# Apply with: kubectl apply -f k8s/secrets.yml
#
# ⚠️  DO NOT commit real values — this file is a TEMPLATE.
# Replace all <CHANGE_ME> placeholders before applying.
#
# In production, use Sealed Secrets, AWS Secrets Manager, or Vault
# instead of applying this file directly.
#
# Generate base64 values:
#   echo -n "mypassword" | base64
#
# Or create from CLI (skips the base64 step):
#   kubectl create secret generic loom-secrets \
#     --from-literal=pg-user=loom \
#     --from-literal=pg-password=YOUR_PASSWORD \
#     --from-literal=nakama-server-key=YOUR_KEY \
#     --from-literal=nakama-session-key=YOUR_32CHAR_KEY \
#     -n loom

apiVersion: v1
kind: Secret
metadata:
  name: loom-secrets
  namespace: loom
  labels:
    app: loom-server
type: Opaque
stringData:
  # ── PostgreSQL ────────────────────────────────────────────────────
  pg-user: "loom"
  pg-password: "<CHANGE_ME>"          # min 16 chars, random

  # ── Redis ─────────────────────────────────────────────────────────
  redis-password: "<CHANGE_ME>"       # leave empty string if no auth

  # ── Nakama ────────────────────────────────────────────────────────
  nakama-server-key: "<CHANGE_ME>"    # used by UE5 client to authenticate
  nakama-session-key: "<CHANGE_ME>"   # exactly 32 chars for AES-256

  # ── Nakama Admin Console ──────────────────────────────────────────
  nakama-console-password: "<CHANGE_ME>"

  # ── Loom Economy Signing ──────────────────────────────────────────
  kalon-ledger-signing-key: "<CHANGE_ME>"

  # ── Optional: AI Services ─────────────────────────────────────────
  anthropic-api-key: ""
  openai-api-key: ""

  # ── Optional: Payments ────────────────────────────────────────────
  stripe-secret-key: ""
  stripe-webhook-secret: ""

---
# K8s Secret for Nakama
apiVersion: v1
kind: Secret
metadata:
  name: nakama-secrets
  namespace: loom
  labels:
    app: nakama
type: Opaque
stringData:
  pg-user: "loom"
  pg-password: "<CHANGE_ME>"
  server-key: "<CHANGE_ME>"
  session-encryption-key: "<CHANGE_ME>"
  console-password: "<CHANGE_ME>"
